<!DOCTYPE html>
<html >
<head>
   
    <title>HW5</title>
    <style>
      * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    
    background-image: url(image.png); 
    background-size: cover;
    background-position: center;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-container {
    width: 100%;
    display: flex;
    justify-content: center;
}

.login-box {
    background: rgba(255, 255, 255, 0.6);
    padding: 40px;
    width: 350px;
    text-align: center;
    border-radius: 4px; 
}

.login-box h2 {
    margin-bottom: 25px;
    font-size: 24px;
    color: #000;
    font-weight: bold;
}

input[type="text"], 
input[type="password"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: none;
    background: rgba(255, 255, 255, 0.8);
    font-size: 14px;
    outline: none;
}

.login-btn {
    width: 100%;
    padding: 12px;
    background-color: #1a4700; 
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 15px;
    transition: 0.3s;
}



.links {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #333;
}

.links a {
    color: #0000EE;
    text-decoration: underline;
}

.links label {
    display: flex;
    align-items: center;
    gap: 5px;
}
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <h2>Account Login</h2>
            
            <form>
                <input type="text" placeholder="user name" required>
                <input type="password" placeholder="password" required>
              
                <button type="submit" class="login-btn">LOGIN</button>
                
                <div class="links">
                    <label>
                        <input type="checkbox"> remember me
                    </label>
                    <a href="#">Forgot Password?</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
